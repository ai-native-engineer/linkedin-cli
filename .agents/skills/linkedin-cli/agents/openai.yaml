interface:
  display_name: "LinkedIn CLI"
  short_description: "Set up, authenticate, read, and publish with linkedin-cli"
  default_prompt: "Use $linkedin-cli for all project-local LinkedIn CLI work: setup, OAuth/cookie auth and diagnostics (auth cookie-file, auth-status, permission-check, redirect/authwall/checkpoint, browser extraction), read commands (feed, saved, profiles, activities, comments, reactions, search), official Posts API dry-runs and live publishing (text, media, multi-image, video, document, poll, article, reshare/quote, reply, update, delete), repost unsupported boundary, reactions, comments, social metadata, insights media/organization/user boundaries, browser fallback, and sns-json-v1 output."

policy:
  allow_implicit_invocation: true
